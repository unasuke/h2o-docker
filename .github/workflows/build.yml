name: build
on:
  push:
    branches:
      - "*"
jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - v2.2.0
          - v2.2.1
          - v2.2.2
          - v2.2.3
          - v2.2.4
          - v2.2.5
          - v2.3.0-beta1
          - v2.2.6
          - v2.3.0-beta2
        distribution:
          - bionic
          - focal
          # - jammy NOTE: current releaed h2o's are not supported build with ruby 3
          # - noble NOTE: openssl v3
          - bullseye
          # - bookworm NOTE: current releaed h2o's are not supported build with ruby 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: 3.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/unasuke/h2o-docker
          tags: |
            type=raw,value=${{ matrix.distribution }}-${{ matrix.version }}
      - run: ./gen_dockerfile.rb '${{ matrix.distribution }}' '${{ matrix.version }}'
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          file: Dockerfile.${{ matrix.distribution }}_${{ matrix.version }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  build-master:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distribution:
          - bionic
          - focal
          - jammy
          - noble
          - bullseye
          - bookworm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: 3.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/unasuke/h2o-docker
          tags: |
            type=raw,value=${{ matrix.distribution }}-master
      - run: ./gen_dockerfile.rb '${{ matrix.distribution }}' master
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          file: Dockerfile.${{ matrix.distribution }}_master
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  test:
    needs:
      - build-release
      - build-master
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - v2.2.0
          - v2.2.1
          - v2.2.2
          - v2.2.3
          - v2.2.4
          - v2.2.5
          - v2.3.0-beta1
          - v2.2.6
          - v2.3.0-beta2
          - master
        distribution:
          - bionic
          - focal
          - bullseye
        include:
          - version: master
            distribution: jammy
          - version: master
            distribution: noble
          - version: master
            distribution: bookworm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker run --detach --volume $(pwd)/test:/etc --publish 8080:8080 --stop-timeout 15 'ghcr.io/unasuke/h2o-docker:${{ matrix.distribution }}-${{ matrix.version }}' h2o -c /etc/h2o.conf
          sleep 3
          curl  http://localhost:8080 | grep 'Hello world'
